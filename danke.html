const svg=document.getElementById('svg'), g=document.getElementById('flower');
const M=50;  // Rand ringsum
svg.setAttribute('viewBox', `${-M} ${-M} ${DATA.vb[0]+2*M} ${DATA.vb[1]+2*M}`);
function toPath(pts){
  const n=pts.length; let d=`M${pts[0][0].toFixed(1)},${pts[0][1].toFixed(1)}`;
  for(let i=0;i<n;i++){
    const p0=pts[(i-1+n)%n],p1=pts[i],p2=pts[(i+1)%n],p3=pts[(i+2)%n];
    const c1x=p1[0]+(p2[0]-p0[0])/6, c1y=p1[1]+(p2[1]-p0[1])/6;
    const c2x=p2[0]-(p3[0]-p1[0])/6, c2y=p2[1]-(p3[1]-p1[1])/6;
    d+=`C${c1x.toFixed(1)},${c1y.toFixed(1)} ${c2x.toFixed(1)},${c2y.toFixed(1)} ${p2[0].toFixed(1)},${p2[1].toFixed(1)}`;
  }
  return d+'Z';
}
const paths=DATA.shapes.map(s=>{
  const p=document.createElementNS('http://www.w3.org/2000/svg','path');
  p.setAttribute('fill',s.c); g.appendChild(p); return p;
});
const easeInOut=t=>t===0?0:t===1?1:(t<.5?Math.pow(2,20*t-10)/2:(2-Math.pow(2,-20*t+10))/2);
const clamp01=x=>Math.max(0,Math.min(1,x));
function render(t){
  const e=t;   // lineares Easing, gleichmäßig
  DATA.shapes.forEach((s,i)=>{
    const pts=s.a.map((ap,k)=>[ap[0]+(s.b[k][0]-ap[0])*e, ap[1]+(s.b[k][1]-ap[1])*e]);
    paths[i].setAttribute('d',toPath(pts));
  });
}
const DUR=3000, HOLD=220, PERIOD=2*DUR+2*HOLD;   // A<->B mit kurzer Pause an den Enden
const reduce=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const start=performance.now();
function frame(now){
  if(reduce){ render(0); return; }
  const ph=(now-start)%PERIOD; let t;
  if(ph<DUR) t=ph/DUR;
  else if(ph<DUR+HOLD) t=1;
  else if(ph<2*DUR+HOLD) t=1-(ph-DUR-HOLD)/DUR;
  else t=0;
  render(t);
  requestAnimationFrame(frame);
}
