<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blumen Parallax Effekt</title>
  <style>
    /* Deine CI-Farben als CSS-Variablen */
    :root {
      --hero-lightblue: #b1dbe3;
      --hero-orange: #ec7d23;
      --hero-pink: #ca5482;
      --hero-darkblue: #384f9e;
      --bg-soft: #f7f7f7;
    }

    body {
      margin: 0;
      background-color: var(--bg-soft);
      overflow: hidden;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Container für den Hintergrund */
    .hero-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Das gesamte SVG pulsiert (auf und zu) */
    #hero-svg {
      width: 120%;
      height: 120%;
      transform-origin: center center;
      animation: bloom 8s ease-in-out infinite alternate;
    }

    /* Jede einzelne Form schwebt leicht versetzt */
    .shape {
      transform-origin: center center;
    }
    
    .shape-1 { animation: float-1 6s ease-in-out infinite alternate; }
    .shape-2 { animation: float-2 7s ease-in-out infinite alternate; }
    .shape-3 { animation: float-3 8s ease-in-out infinite alternate; }
    .shape-4 { animation: float-1 6.5s ease-in-out infinite alternate; }
    .shape-5 { animation: float-2 7.5s ease-in-out infinite alternate; }
    .shape-6 { animation: float-3 8.5s ease-in-out infinite alternate; }

    /* --- ANIMATIONEN --- */

    /* Öffnen und Schließen der "Blume" */
    @keyframes bloom {
      0% { 
        transform: scale(0.85) rotate(-2deg); 
      }
      100% { 
        transform: scale(1.15) rotate(3deg); 
      }
    }

    /* Individuelle Schwebe-Bewegungen für den Parallax-Look */
    @keyframes float-1 {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(-40px, -30px) scale(1.05); }
    }
    @keyframes float-2 {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(35px, 40px) scale(1.02); }
    }
    @keyframes float-3 {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(30px, -35px) scale(1.08); }
    }
  </style>
</head>
